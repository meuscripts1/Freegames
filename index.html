<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sus Games Roblox!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      overflow-y: auto;
      position: relative;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 2;
      padding: 80px 20px 120px;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }
    h1 {
      font-size: 5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeInUp 1.6s ease-out 0.3s forwards;
    }
    .subtitle {
      font-size: 1.35rem;
      opacity: 0.9;
      max-width: 780px;
      margin: 0 auto 70px;
      line-height: 1.5;
      opacity: 0;
      animation: fadeInUp 1.6s ease-out 0.7s forwards;
    }
    .boxes {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeInUp 1.6s ease-out 1.1s forwards;
    }
    .box {
      flex: 1;
      min-width: 300px;
      max-width: 370px;
      background: rgba(20, 20, 20, 0.92);
      border: 2.5px solid #cc2222;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.4s ease;
      opacity: 0;
      animation: fadeInUp 1.8s ease-out 1.4s forwards;
    }
    .box:hover {
      transform: translateY(-15px);
      border-color: #ff5555;
    }
    .box img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 20px;
      border: 2px solid #cc2222;
    }
    .box h3 {
      font-size: 1.75rem;
      color: #ff6666;
      margin-bottom: 12px;
    }
    .box p {
      font-size: 1.05rem;
      line-height: 1.55;
      opacity: 0.88;
      text-align: center;
      margin-bottom: 25px;
      flex: 1;
    }
    .btn {
      padding: 18px 40px;
      font-size: 1.25rem;
      font-weight: 700;
      background-color: #cc2222;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s ease;
      width: 85%;
      margin-top: auto;
      box-shadow: 0 6px 20px rgba(204, 34, 34, 0.4);
      text-decoration: none;
      display: inline-block;
      position: relative;
    }
    .btn:hover {
      background-color: #ff3333;
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(204, 34, 34, 0.6);
    }
    .btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 115%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #ff8888;
      padding: 4px 9px;
      border-radius: 4px;
      font-size: 0.68rem;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 20;
      border: 1px solid #cc2222;
      max-width: 380px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn:hover::after {
      opacity: 1;
      visibility: visible;
      bottom: 125%;
    }

    /* Estilo do texto novo */
    .follow-text {
      margin: 60px auto 30px;
      font-size: 1.5rem;
      opacity: 0;
      animation: fadeInUp 1.8s ease-out 2.3s forwards;
    }
    .follow-text a {
      color: #00aaff;
      text-decoration: underline;
      font-weight: 600;
    }
    .follow-text a:hover {
      color: #55ccff;
    }

    .group-box {
      max-width: 280px;
      margin: 50px auto 0;
      padding: 18px;
      opacity: 0;
      animation: fadeInUp 1.8s ease-out 2.0s forwards;
    }
    .group-box img {
      height: 180px !important;
    }
    .group-box h3 {
      font-size: 1.55rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(60px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="content">
    <h1>Free Games!</h1>
    <p class="subtitle">
      These games last for 20 days, and after 20 days the site is updated with more games!
    </p>
    <div class="boxes">
      <!-- Caixa 1, 2 e 3 permanecem iguais -->
      <div class="box"> ... </div>
      <div class="box"> ... </div>
      <div class="box"> ... </div>
    </div>

    <!-- Caixa do Grupo -->
    <div class="box group-box">
      <img src="https://i.imgur.com/cjjsOl5.png" alt="My Group">
      <h3>my group is wztq1</h3>
      <p>Join the group!! (if you want!)</p>
      <a href="https://is.gd/9XwFip"
         data-tooltip="https://www.roblox.com.py/communities/310857172811/wztq1"
         class="btn" target="_blank">Join the group now!!</a>
    </div>

    <!-- ✅ Texto simples adicionado abaixo -->
    <div class="follow-text">
      Follow me on Roblox!! 
      <a href="https://is.gd/hwRl26" target="_blank">
        https://www.roblox.com.py/users/310857172811/profile
      </a>
    </div>
  </div>

  <!-- Script do canvas (permanece igual) -->
  <script>
    // ... (código do canvas igual ao anterior)
  </script>
</body>
</html>
