<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remove Fundo + ControlDarkDark</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    h1 {
      margin-bottom: 10px;
    }
    .drop-zone {
      border: 3px dashed #555;
      padding: 60px;
      border-radius: 12px;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #00ff9d;
      background: #222;
    }
    img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      margin: 20px 0;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }
    button {
      background: #00ff9d;
      color: #000;
      border: none;
      padding: 14px 32px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #00cc7a;
    }
    .result {
      margin-top: 30px;
    }
    .color-preview {
      display: inline-block;
      width: 30px;
      height: 30px;
      background: #0a0a0a;
      border: 2px solid #333;
      vertical-align: middle;
      border-radius: 4px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ Remove Fundo + ControlDarkDark</h1>
    <p>Importe sua imagem e ela vai ficar com fundo <strong>ControlDarkDark</strong> <span class="color-preview"></span></p>

    <div id="dropZone" class="drop-zone">
      <p>Clique aqui ou arraste a imagem</p>
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <div id="previewOriginal"></div>

    <button id="processBtn" style="display: none;">🔄 Remover Fundo e Colocar ControlDarkDark</button>

    <div class="result" id="result"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.0/dist/browser/index.js"></script>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const previewOriginal = document.getElementById('previewOriginal');
    const resultDiv = document.getElementById('result');

    let currentImage = null;
    let currentFile = null;

    // Cor ControlDarkDark (bem escura)
    const controlDarkDark = '#0a0a0a';

    // Drag and drop
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFile);

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) processSelectedFile(file);
    });

    function handleFile(e) {
      const file = e.target.files[0];
      if (file) processSelectedFile(file);
    }

    function processSelectedFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('Por favor, selecione uma imagem!');
        return;
      }

      currentFile = file;
      const reader = new FileReader();
      reader.onload = function(e) {
        currentImage = e.target.result;
        previewOriginal.innerHTML = `<img src="${currentImage}" alt="Original">`;
        processBtn.style.display = 'inline-block';
      };
      reader.readAsDataURL(file);
    }

    // Processar remoção de fundo
    processBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      processBtn.textContent = '⏳ Processando... (pode demorar uns segundos)';
      processBtn.disabled = true;

      try {
        // Remove o fundo usando biblioteca client-side
        const imageBlob = await window.BackgroundRemoval.removeBackground(currentFile);

        // Cria URL da imagem com fundo removido
        const transparentUrl = URL.createObjectURL(imageBlob);

        // Cria canvas para colocar o fundo ControlDarkDark
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');

          // Preenche com ControlDarkDark
          ctx.fillStyle = controlDarkDark;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Desenha a imagem sem fundo por cima
          ctx.drawImage(img, 0, 0);

          const finalUrl = canvas.toDataURL('image/png');

          resultDiv.innerHTML = `
            <h2>✅ Resultado Final</h2>
            <img src="${finalUrl}" alt="Resultado">
            <br><br>
            <a href="${finalUrl}" download="imagem-control-dark-dark.png">
              <button>⬇️ Baixar Imagem</button>
            </a>
          `;
        };
        img.src = transparentUrl;

      } catch (error) {
        console.error(error);
        alert('Erro ao remover o fundo. Tente com outra imagem ou navegador.');
      }

      processBtn.textContent = '🔄 Remover Fundo e Colocar ControlDarkDark';
      processBtn.disabled = false;
    });
  </script>
</body>
</html>
