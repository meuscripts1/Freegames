<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolinhas Vermelhas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeIn 2s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(50px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 4.8rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.5rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="content">
    <h1>OlhadinhaDEV</h1>
    <p>Bolinhas vermelhas descendo</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let width, height;

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * -height - 50;   // começa bem acima
        this.size = Math.random() * 3 + 4.5;     // tamanho pequeno e justo (4.5 a 7.5)
        this.speed = Math.random() * 2.2 + 2.0;  // velocidade suave para baixo
        this.opacity = Math.random() * 0.3 + 0.8;
      }

      update() {
        this.y += this.speed;

        if (this.y > height + 30) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        
        ctx.fillStyle = '#cc2222';   // vermelho normal

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function initParticles() {
      particles = [];
      // Menos bolinhas agora (reduzido)
      const quantidade = Math.floor(width / 12) + 45;   // bem menos que antes
      for (let i = 0; i < quantidade; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      // Limpa completamente (sem trilha)
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);

      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      requestAnimationFrame(animate);
    }

    // Inicialização
    window.addEventListener('resize', () => {
      resizeCanvas();
      initParticles();
    });

    resizeCanvas();
    initParticles();
    animate();
  </script>
</body>
</html>
