<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Games!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 1.8s ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(80px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
      animation: fadeInUp 1.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .subtitle {
      font-size: 1.65rem;
      opacity: 0.9;
      margin-bottom: 50px;
      animation: fadeInUp 1.8s ease-out 0.5s forwards;
      opacity: 0;
    }

    .boxes {
      display: flex;
      gap: 28px;
      width: 100%;
      max-width: 1080px;
      animation: fadeInUp 1.8s ease-out 0.9s forwards;
      opacity: 0;
    }

    .box {
      flex: 1;
      background: rgba(20, 20, 20, 0.92);
      border: 2.5px solid #cc2222;
      border-radius: 20px;
      padding: 25px;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.4s ease;
    }

    .box:hover {
      transform: translateY(-12px);
      border-color: #ff5555;
      background: rgba(30, 30, 30, 0.95);
    }

    .box img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 20px;
      border: 2px solid #cc2222;
    }

    .box h3 {
      font-size: 1.7rem;
      color: #ff6666;
      margin-bottom: 12px;
    }

    .box p {
      font-size: 1.05rem;
      line-height: 1.55;
      opacity: 0.88;
      text-align: center;
    }

    @media (max-width: 920px) {
      .boxes {
        flex-direction: column;
        gap: 25px;
      }
      h1 {
        font-size: 3.8rem;
      }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="content">
    <h1>Free Games!</h1>
    <p class="subtitle">Jogos grátis do Roblox</p>

    <div class="boxes">
      <!-- Caixa 1 -->
      <div class="box">
        <img src="https://i.imgur.com/f1ibehE.png" alt="Roblox Game 1">
        <h3>Aventura no Deserto</h3>
        <p>Explore montanhas, pontes e ruínas em um mundo aberto incrível.</p>
      </div>

      <!-- Caixa 2 -->
      <div class="box">
        <img src="https://i.imgur.com/3HGfbVW.png" alt="Roblox Game 2">
        <h3>Sobrevivência Extrema</h3>
        <p>Sobreviva às noites perigosas e construa sua base segura.</p>
      </div>

      <!-- Caixa 3 -->
      <div class="box">
        <img src="https://i.imgur.com/8BDa0hN.png" alt="Roblox Game 3">
        <h3>Mundo dos Construtores</h3>
        <p>Construa, crie e divirta-se com seus amigos.</p>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let width, height;

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * -height - 100;
        this.size = Math.random() * 2.8 + 3.8;
        this.speed = Math.random() * 2.1 + 1.7;
        this.opacity = Math.random() * 0.3 + 0.75;
      }

      update() {
        this.y += this.speed;
        if (this.y > height + 40) this.reset();
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = '#cc2222';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function initParticles() {
      particles = [];
      const quantidade = Math.floor(width / 15) + 32;
      for (let i = 0; i < quantidade; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      initParticles();
    });

    resizeCanvas();
    initParticles();
    animate();
  </script>
</body>
</html>
