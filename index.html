<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Xits Free</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1f;
      color: #e0e0ff;
      overflow: hidden;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    canvas {
      display: block;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .painel {
      background: rgba(20, 20, 60, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 120, 255, 0.3);
      border-radius: 16px;
      padding: 30px 35px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 6px 35px rgba(0,0,0,0.65);
    }

    h1 {
      font-size: 2.1rem;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .foto {
      width: 140px;
      height: 140px;
      margin: 20px auto;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(120, 140, 255, 0.45);
      box-shadow: 0 0 25px rgba(100, 120, 255, 0.4);
    }

    .foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .key-box {
      margin: 20px 0 30px;
      padding: 14px 20px;
      background: rgba(30, 30, 80, 0.75);
      border: 1px solid #5a6aff;
      border-radius: 10px;
      font-family: monospace;
      font-size: 1.35rem;
      letter-spacing: 2px;
      color: #d0d8ff;
      display: none;
      user-select: all;
    }

    button {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px rgba(124,58,237,0.45);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(124,58,237,0.6);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

<div id="particles"></div>

<div class="container">
  <div class="painel">
    <h1>Painel Xits Free</h1>
    
    <div class="foto">
      <img src="https://i.imgur.com/EKL8XfU.png" alt="foto do painel">
    </div>

    <div class="key-box" id="keyReveal">
      XitsFree1500
    </div>

    <button onclick="revelarKey()">
      Entrar com a Key
    </button>
  </div>
</div>

<!-- tsParticles -->
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/all@3.5.0/tsparticles.all.min.js"></script>
<script>
  tsParticles.load("particles", {
    fullScreen: { enable: true },
    fpsLimit: 90,
    particles: {
      number: { value: 60, density: { enable: true, value_area: 800 } },
      color: { value: ["#8b5cf6", "#a78bfa", "#c084fc", "#7c3aed"] },
      shape: { type: "circle" },
      opacity: { value: 0.5, random: true, animation: { enable: true, speed: 1, minimumValue: 0.2 } },
      size: { value: { min: 1, max: 4 }, random: true, animation: { enable: true, speed: 2 } },
      move: {
        enable: true,
        speed: { min: 0.5, max: 1.6 },
        direction: "none",
        random: true,
        straight: false,
        outModes: { default: "out" },
        attract: { enable: true, rotateX: 400, rotateY: 800 }
      },
      interactivity: {
        detectsOn: "canvas",
        events: { onHover: { enable: true, mode: "grab" }, resize: true },
        modes: { grab: { distance: 160, links: { opacity: 0.6 } } }
      },
      links: {
        enable: true,
        distance: 130,
        color: "#a78bfa",
        opacity: 0.4,
        width: 1
      }
    },
    detectRetina: true
  });

  function revelarKey() {
    document.getElementById("keyReveal").style.display = "block";
  }
</script>

</body>
</html>
