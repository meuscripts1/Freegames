<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolinhas Vermelhas - Simples</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeIn 2s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(50px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 4.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ff3333, #ff7777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.5rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="content">
    <h1>OlhadinhaDEV</h1>
    <p>Bolinhas vermelhas caindo suavemente</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let width, height;

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * -height;     // começa acima da tela
        this.size = Math.random() * 9 + 5;    // tamanho simples entre 5 e 14
        this.speed = Math.random() * 2.5 + 1.8; // velocidade constante para baixo
        this.opacity = Math.random() * 0.6 + 0.5;
      }

      update() {
        this.y += this.speed;

        // Quando a bolinha sai da tela, volta para cima
        if (this.y > height + 20) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        
        // Bolinha vermelha simples com leve brilho
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff3333';

        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function initParticles() {
      particles = [];
      const quantidade = Math.floor(width / 8) + 80; // mais bolinhas em telas maiores
      for (let i = 0; i < quantidade; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      // Fundo escuro com leve rastro (deixa movimento mais bonito)
      ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
      ctx.fillRect(0, 0, width, height);

      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      requestAnimationFrame(animate);
    }

    // Inicialização
    window.addEventListener('resize', () => {
      resizeCanvas();
      initParticles();
    });

    resizeCanvas();
    initParticles();
    animate();
  </script>
</body>
</html>
