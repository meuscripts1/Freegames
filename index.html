<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OlhadinhaDEV • Universo Vermelho</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 800px;
      padding: 2rem;
      animation: entrance 1.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes entrance {
      from {
        opacity: 0;
        transform: translateY(60px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ff3333, #ff6666, #ff9999);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      text-shadow: 0 0 40px rgba(255, 50, 50, 0.5);
    }

    p {
      font-size: 1.4rem;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }

    .btn {
      padding: 16px 40px;
      font-size: 1.2rem;
      font-weight: 600;
      background: #ff3333;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(255, 51, 51, 0.4);
    }

    .btn:hover {
      transform: translateY(-8px) scale(1.05);
      background: #ff5555;
      box-shadow: 0 20px 40px rgba(255, 51, 51, 0.6);
    }

    .section {
      margin-top: 100px;
      opacity: 0;
      animation: entrance 1.5s ease-out 0.6s forwards;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="content">
    <h1>OlhadinhaDEV</h1>
    <p>Explorando o universo com código e criatividade</p>
    <button class="btn" onclick="alert('Bem-vindo ao meu site animado! 🚀')">Entrar no Universo</button>

    <div class="section">
      <h2 style="color:#ff6666; font-size:2rem;">Bolhas Vermelhas em Queda Contínua</h2>
      <p>Quanto mais bolinhas somem embaixo, mais aparecem em cima. Efeito infinito!</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let width, height;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height * -0.5; // começa de cima (pode ser negativo)
        this.size = Math.random() * 8 + 4;        // tamanho entre 4 e 12
        this.speed = Math.random() * 3 + 1.5;     // velocidade de queda
        this.opacity = Math.random() * 0.7 + 0.4;
        this.hueShift = Math.random() * 20 - 10;  // leve variação no vermelho
      }

      update() {
        this.y += this.speed;

        // Leve movimento horizontal (balanço)
        this.x += Math.sin(this.y / 50) * 0.8;

        // Quando sai da tela, reinicia (mantém quantidade constante)
        if (this.y > height + 20) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = `hsl(0, 100%, ${70 + this.hueShift}%)`; // tons de vermelho brilhante

        ctx.shadowBlur = 25;
        ctx.shadowColor = '#ff3333';

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        // Brilho interno
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(this.x - this.size/3, this.y - this.size/3, this.size/3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function initParticles(count) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.12)'; // rastro suave (não apaga totalmente)
      ctx.fillRect(0, 0, width, height);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    // Inicializa
    window.addEventListener('resize', () => {
      resize();
      initParticles(180); // ~180 bolinhas (ajuste se quiser mais/menos)
    });

    resize();
    initParticles(180);
    animate();

    // Dica: se quiser mais bolinhas, aumente o número em initParticles()
  </script>
</body>
</html>
